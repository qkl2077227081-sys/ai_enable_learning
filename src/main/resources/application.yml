server:
  port: 8080 #要与前端request.js对应


spring:
  data:
    redis:
      host: 192.168.6.100
      port: 6379
  servlet:
    multipart:
      max-request-size: 150MB
      max-file-size: 100MB
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: jdbc:mysql://localhost:3306/exam_system_klv?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=GMT%2b8
    username: root
    password:
    hikari:
      connection-test-query: SELECT 1 # 自动检测连接
      connection-timeout: 60000 #数据库连接超时时间,默认30秒
      idle-timeout: 500000 #空闲连接存活最大时间，默认600000（10分钟）
      max-lifetime: 540000 #此属性控制池中连接的最长生命周期，值0表示无限生命周期，默认1800000即30分钟
      maximum-pool-size: 12 #连接池最大连接数，默认是10
      minimum-idle: 10 #最小空闲连接数量
      pool-name: SPHHikariPool # 连接池名称

#用于打印框架生成的sql语句便于测试
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    auto-mapping-behavior: full #开启嵌套式映射

#minio的配置
minio:
  endpoint: http://192.168.6.100:9000
  username: minioadmin
  password: minioadmin
  bucket-name: enen

kimi:
  api:
    model: moonshot-v1-32k
    url: https://api.moonshot.cn/v1/chat/completions
    api-key: ${KIMI_API_KEY:placeholder}
    max-tokens: 4096
    temperature: 0.3
deepseek:
  api:
    model: deepseek-v4-flash
    url: https://api.deepseek.com/chat/completions
    api-key: ${DEEPSEEK_API_KEY:placeholder}
    max-tokens: 4096
    temperature: 0.7

logging:
  level:
    root: info #设置级别